[plugin]
name             = "feature-frontend"
version          = "1.1.0"
description      = "Unified audio feature extraction frontend: log-mel, MFCC+delta, ZCR, spectral features, chroma, raw waveform passthrough."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["nodes.py"]
license          = "MIT"

tags = [
    "audio",
    "features",
    "ml",
    "frontend",
    "spectrogram",
    "mfcc",
    "delta",
    "zcr",
    "ssl",
    "embeddings"
]

dependencies = [
    "numpy>=1.24",
    "librosa>=0.10",
]