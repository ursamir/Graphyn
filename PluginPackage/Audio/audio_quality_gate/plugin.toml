[plugin]
name             = "audio-quality-gate"
version          = "1.0.0"
description      = "Dataset quality validation: SNR, clipping, silence, loudness, bandwidth, duration."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["nodes.py"]
license          = "MIT"

tags = ["audio", "quality", "validation", "preprocessing"]

dependencies = [
    "numpy>=1.24",
    "librosa>=0.10",
    "scipy>=1.10",
]

optional_dependencies = [
    "pyloudnorm>=0.1",
]
