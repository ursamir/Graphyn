[plugin]
name             = "speech-enhancer"
version          = "1.0.0"
description      = "Speech cleanup: denoising (spectral subtraction or DeepFilterNet), dereverberation, vocal isolation, and telephony bandpass."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["nodes.py"]
license          = "MIT"

tags = [
    "audio",
    "enhancement",
    "denoising",
    "speech",
    "deepfilter",
    "preprocessing"
]

dependencies = [
    "numpy>=1.24",
    "scipy>=1.10",
    "librosa>=0.10",
]

optional_dependencies = [
    "noisereduce>=3.0",
    "deepfilternet>=0.5",
    "torch>=2.0",
]
