[plugin]
name             = "stream-ingest"
version          = "1.0.0"
description      = "Real-time streaming audio ingestion from microphone, WebSocket, and file streams."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["nodes.py"]
license          = "MIT"

tags = ["audio", "streaming", "realtime", "input"]

dependencies = [
    "numpy>=1.24",
    "librosa>=0.10",
]

optional_dependencies = [
    "sounddevice>=0.4",
    "websockets>=11.0",
]
