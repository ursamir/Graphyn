[plugin]
name             = "dataset-ingest"
version          = "1.1.0"
description      = "Universal audio dataset ingestion from filesystem, archives (ZIP, TAR), HuggingFace, S3, and manifests."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["nodes.py"]
license          = "MIT"

tags = ["audio", "input", "dataset", "ingestion"]

dependencies = [
    "numpy>=1.24",
    "librosa>=0.10",
    "soundfile>=0.12",
]

optional_dependencies = [
    "datasets>=2.14",
    "boto3>=1.28",
]
