[plugin]
name             = "dataset-builder"
version          = "1.0.0"
description      = "Assemble FeatureArray objects into ML-ready train/val/test datasets."
author           = "Graphyn Plugins"
platform_version = ">=0.0"
entry_points     = ["types.py", "nodes.py"]
license          = "MIT"

tags = ["ml", "dataset", "training", "common"]

dependencies = [
    "numpy>=1.24",
    "scikit-learn>=1.3",
]

optional_dependencies = [
    "tensorflow>=2.13",
    "torch>=2.0",
]
